{% extends 'base.html' %}
{% load widget_tweaks %}
{% block content %}
<h2>{% if form.instance.pk %}Editar Proveedor{% else %}Nuevo Proveedor{% endif %}</h2>
<form method="post">
  {% csrf_token %}
  {% for field in form %}
  <div class="mb-3">
    {{ field.label_tag }} {% render_field field class="form-control" %}
  </div>
  {% endfor %}
  <button type="submit" class="btn btn-success">Guardar</button>
  <a href="{% url 'proveedores:lista' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}

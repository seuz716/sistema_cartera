<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema de Cartera{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; }
        .content-wrapper { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05);}
        footer { margin-top: 3rem; padding: 1rem 0; background: #212529; color: #fff; text-align: center; border-radius: 0 0 8px 8px;}
    </style>
</head>
<body>
    <!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Cartera</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <!-- Home -->
                <li class="nav-item">
                    <a href="{% url 'home' %}" class="nav-link">🏠 Inicio</a>
                </li>

                <!-- Clientes -->
                <li class="nav-item">
                    <a href="{% url 'clientes:cliente_list' %}" class="nav-link">👥 Clientes</a>
                </li>

                <!-- Productos -->
                <li class="nav-item">
                    <a href="{% url 'productos:lista' %}" class="nav-link">📦 Productos</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

    <!-- Contenido dinámico -->
    <div class="container content-wrapper">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        &copy; {{ year|default:2024 }} Sistema de Cartera. Todos los derechos reservados.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
